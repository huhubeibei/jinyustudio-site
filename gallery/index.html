<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片画廊 | JinyuStudio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-bg: #0a0a0a;
            --color-surface: #1a1a1a;
            --color-surface-elevated: #242424;
            --color-border: rgba(255, 255, 255, 0.05);
            --color-border-hover: rgba(255, 255, 255, 0.1);
            --color-text: #ffffff;
            --color-text-secondary: #888;
            --color-text-tertiary: #555;
            --color-accent: #3b82f6;
            --color-glass-bg: rgba(255, 255, 255, 0.08);
            --color-glass-border: rgba(255, 255, 255, 0.1);
            --blur-strength: 20px;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s ease;
            --transition-slow: 0.5s ease;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ==================== 页面头部 ==================== */
        .page-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(10, 10, 10, 0.95), rgba(10, 10, 10, 0.85));
            backdrop-filter: blur(var(--blur-strength));
            -webkit-backdrop-filter: blur(var(--blur-strength));
            border-bottom: 1px solid var(--color-border);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1800px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .logo:hover {
            opacity: 0.8;
        }

        .photo-count {
            font-size: 0.875rem;
            color: var(--color-text-secondary);
            padding: 0.25rem 0.75rem;
            background: var(--color-glass-bg);
            border: 1px solid var(--color-glass-border);
            border-radius: 9999px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--color-glass-bg);
            border: 1px solid var(--color-glass-border);
            border-radius: var(--radius-md);
            color: var(--color-text);
            text-decoration: none;
            font-size: 0.875rem;
            transition: all var(--transition-fast);
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .back-link svg {
            width: 16px;
            height: 16px;
        }

        /* ==================== 主内容区 ==================== */
        .main-content {
            padding-top: 80px;
            min-height: 100vh;
        }

        /* ==================== 瀑布流布局 ==================== */
        .masonry-container {
            padding: 1rem;
            max-width: 1800px;
            margin: 0 auto;
        }

        .masonry-grid {
            column-count: 2;
            column-gap: 0.5rem;
        }

        @media (min-width: 640px) {
            .masonry-grid { column-count: 3; }
        }

        @media (min-width: 1024px) {
            .masonry-grid { column-count: 4; column-gap: 0.75rem; }
        }

        @media (min-width: 1440px) {
            .masonry-grid { column-count: 5; }
        }

        /* ==================== 照片卡片 ==================== */
        .photo-card {
            break-inside: avoid;
            margin-bottom: 0.5rem;
            position: relative;
            overflow: hidden;
            border-radius: var(--radius-md);
            cursor: pointer;
            background: var(--color-surface);
            transition: transform var(--transition-normal), 
                        box-shadow var(--transition-normal);
        }

        .photo-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .photo-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        .photo-wrapper img {
            display: block;
            width: 100%;
            height: auto;
            transition: transform var(--transition-normal);
        }

        .photo-card:hover .photo-wrapper img {
            transform: scale(1.05);
        }

        /* 加载占位符 */
        .photo-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                135deg,
                var(--color-surface) 0%,
                var(--color-surface-elevated) 100%
            );
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .photo-wrapper img.loaded + .photo-placeholder {
            display: none;
        }

        /* 悬停信息覆盖层 */
        .photo-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem;
            background: linear-gradient(to top, 
                rgba(0, 0, 0, 0.95) 0%, 
                rgba(0, 0, 0, 0.7) 50%, 
                transparent 100%);
            opacity: 0;
            transform: translateY(10px);
            transition: all var(--transition-normal);
        }

        .photo-card:hover .photo-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        .photo-title {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: #fff;
        }

        .photo-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .photo-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
            margin-top: 0.5rem;
        }

        .photo-tag {
            display: inline-block;
            padding: 0.25rem 0.625rem;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 9999px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all var(--transition-fast);
        }

        .photo-tag:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }

        /* ==================== 照片查看器 ==================== */
        .photo-viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
        }

        .photo-viewer.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 模糊背景 */
        .viewer-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(80px);
            transform: scale(1.1);
            opacity: 0.3;
        }

        /* 查看器主体 */
        .viewer-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
        }

        /* 工具栏 */
        .viewer-toolbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 20;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toolbar-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toolbar-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .toolbar-btn svg {
            width: 20px;
            height: 20px;
        }

        /* 计数器 */
        .photo-counter {
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 0.375rem 0.875rem;
            border-radius: 9999px;
        }

        /* 图片容器 */
        .viewer-image-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 100px;
            overflow: hidden;
        }

        .viewer-image-wrapper {
            position: relative;
            max-width: 100%;
            max-height: 100%;
            overflow: hidden;
            cursor: grab;
        }

        .viewer-image-wrapper:active {
            cursor: grabbing;
        }

        .viewer-image {
            max-width: 100%;
            max-height: calc(100vh - 160px);
            object-fit: contain;
            border-radius: var(--radius-md);
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s ease;
            user-select: none;
            -webkit-user-drag: none;
        }

        .viewer-image.zoomed {
            cursor: grab;
        }

        /* 导航按钮 */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 15;
            width: 50px;
            height: 50px;
            border-radius: var(--radius-lg);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.7;
        }

        .nav-btn:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-50%) scale(1.1);
        }

        .nav-btn.prev {
            left: 1.5rem;
        }

        .nav-btn.next {
            right: 1.5rem;
        }

        .nav-btn svg {
            width: 24px;
            height: 24px;
        }

        /* ==================== 信息面板 ==================== */
        .info-panel {
            position: absolute;
            top: 0;
            right: 0;
            width: 400px;
            max-width: 90vw;
            height: 100%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid var(--color-border);
            transform: translateX(100%);
            transition: transform var(--transition-normal);
            overflow-y: auto;
            z-index: 25;
        }

        .info-panel.open {
            transform: translateX(0);
        }

        .info-panel-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.98);
            z-index: 1;
        }

        .info-panel-title {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .info-panel-content {
            padding: 1.5rem;
        }

        .info-section {
            margin-bottom: 1.5rem;
        }

        .info-section-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-text-secondary);
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .info-section-title svg {
            width: 14px;
            height: 14px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
        }

        .info-item {
            background: var(--color-surface);
            padding: 0.625rem 0.75rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--color-border);
        }

        .info-item.full-width {
            grid-column: 1 / -1;
        }

        .info-item-label {
            font-size: 0.6875rem;
            color: var(--color-text-tertiary);
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .info-item-value {
            font-size: 0.875rem;
            color: var(--color-text);
            font-weight: 500;
        }

        .info-description {
            font-size: 0.875rem;
            color: var(--color-text-secondary);
            line-height: 1.6;
            margin-top: 0.5rem;
        }

        /* EXIF 网格 */
        .exif-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
        }

        .exif-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: var(--color-surface);
            border-radius: var(--radius-sm);
            border: 1px solid var(--color-border);
        }

        .exif-item svg {
            width: 16px;
            height: 16px;
            color: var(--color-text-secondary);
            flex-shrink: 0;
        }

        .exif-item-content {
            min-width: 0;
        }

        .exif-item-label {
            font-size: 0.625rem;
            color: var(--color-text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .exif-item-value {
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--color-text);
        }

        /* 标签 */
        .tags-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            padding: 0.375rem 0.75rem;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 9999px;
            font-size: 0.8125rem;
            color: var(--color-text);
            transition: all var(--transition-fast);
        }

        .tag:hover {
            background: var(--color-surface-elevated);
            border-color: var(--color-border-hover);
        }

        /* ==================== 底部栏 ==================== */
        .viewer-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem 1.5rem;
            background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            z-index: 15;
        }

        .footer-btn {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-md);
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .footer-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .footer-btn svg {
            width: 16px;
            height: 16px;
        }

        /* ==================== 缩放控制 ==================== */
        .zoom-controls {
            position: absolute;
            bottom: 80px;
            right: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            z-index: 15;
        }

        .zoom-btn {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .zoom-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .zoom-btn svg {
            width: 20px;
            height: 20px;
        }

        .zoom-level {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
        }

        /* ==================== 提示 ==================== */
        .viewer-hint {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            z-index: 15;
            opacity: 1;
            transition: opacity var(--transition-normal);
        }

        .viewer-hint.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .hint-item {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .hint-key {
            padding: 0.125rem 0.375rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            font-size: 0.6875rem;
        }

        /* ==================== 响应式 ==================== */
        @media (max-width: 768px) {
            .header-content {
                padding: 0.75rem 1rem;
            }

            .logo {
                font-size: 1rem;
            }

            .photo-count {
                display: none;
            }

            .masonry-container {
                padding: 0.5rem;
            }

            .viewer-image-container {
                padding: 60px 20px;
            }

            .nav-btn {
                width: 40px;
                height: 40px;
            }

            .nav-btn.prev {
                left: 0.5rem;
            }

            .nav-btn.next {
                right: 0.5rem;
            }

            .info-panel {
                width: 100%;
                height: 70vh;
                top: auto;
                bottom: 0;
                border-left: none;
                border-top: 1px solid var(--color-border);
                border-radius: var(--radius-xl) var(--radius-xl) 0 0;
                transform: translateY(100%);
            }

            .info-panel.open {
                transform: translateY(0);
            }

            .viewer-toolbar {
                padding: 0.75rem 1rem;
            }

            .zoom-controls {
                bottom: 120px;
                right: 1rem;
            }

            .viewer-footer {
                padding: 0.75rem 1rem;
                gap: 0.5rem;
            }

            .footer-btn span {
                display: none;
            }

            .viewer-hint {
                display: none;
            }
        }

        /* ==================== 滚动条 ==================== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--color-surface);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--color-surface-elevated);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #333;
        }

        /* ==================== 加载动画 ==================== */
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            color: var(--color-text-secondary);
        }
    </style>
</head>
<body>
    <!-- 页面头部 -->
    <header class="page-header">
        <div class="header-content">
            <div class="header-left">
                <a href="/" class="logo">← JinyuStudio</a>
                <span class="photo-count" id="photo-count">12 张照片</span>
            </div>
            <div class="header-right">
                <a href="/" class="back-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    <span>返回首页</span>
                </a>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content">
        <div class="masonry-container">
            <div class="masonry-grid" id="gallery">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <p style="margin-top: 1rem;">加载中...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- 照片查看器 -->
    <div class="photo-viewer" id="viewer">
        <div class="viewer-backdrop" id="viewer-backdrop"></div>
        
        <div class="viewer-container">
            <!-- 工具栏 -->
            <div class="viewer-toolbar">
                <div class="toolbar-left">
                    <span class="photo-counter" id="photo-counter">1 / 12</span>
                </div>
                <div class="toolbar-right">
                    <button class="toolbar-btn" id="info-btn" title="照片信息">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="16" x2="12" y2="12"/>
                            <line x1="12" y1="8" x2="12.01" y2="8"/>
                        </svg>
                    </button>
                    <button class="toolbar-btn" id="share-btn" title="分享">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="18" cy="5" r="3"/>
                            <circle cx="6" cy="12" r="3"/>
                            <circle cx="18" cy="19" r="3"/>
                            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                        </svg>

                thumbnail: 'https://picsum.photos/id/1041/800/600',
                full: 'https://picsum.photos/id/1041/1920/1440',
                format: 'JPEG',
                width: 6000,
                height: 4000,
                aspectRatio: 1.5,
                size: 5.1,
                camera: 'Nikon Z9',
                lens: 'NIKKOR Z 70-200mm f/2.8',
                focalLength: '180mm',
                aperture: 'f/4',
                shutterSpeed: '1/2000s',
                iso: '400',
                location: '内蒙古·呼伦贝尔',
                date: '2024-11-20 16:45:33',
                tags: ['草原', '骏马', '内蒙古', '夏天'],
                exif: {
                    make: 'Nikon',
                    model: 'Z 9',
                    lens: 'NIKKOR Z 70-200mm f/2.8 VR S',
                    focalLength: '180mm',
                    focalLength35mm: '180mm',
                    aperture: 'f/4',
                    shutterSpeed: '1/2000',
                    iso: '400',
                    exposureBias: '+0.3 EV',
                    meteringMode: '评价测光',
                    whiteBalance: '日光',
                    flash: '未闪光',
                    gps: {
                        latitude: 49.212,
                        longitude: 119.765,
                        altitude: 650
                    }
                }
            }
        ];

        // ==================== 全局状态 ====================
        let currentPhotoIndex = 0;
        let zoomLevel = 1;
        let panX = 0;
        let panY = 0;
        let isDragging = false;
        let startX, startY;
        let initialDistance = 0;
        let initialZoom = 1;

        // ==================== DOM 元素 ====================
        const gallery = document.getElementById('gallery');
        const viewer = document.getElementById('viewer');
        const viewerImage = document.getElementById('viewer-image');
        const viewerBackdrop = document.getElementById('viewer-backdrop');
        const photoCounter = document.getElementById('photo-counter');
        const photoCount = document.getElementById('photo-count');
        const infoPanel = document.getElementById('info-panel');
        const infoPanelContent = document.getElementById('info-panel-content');
        const panelTitle = document.getElementById('panel-title');
        const viewerHint = document.getElementById('viewer-hint');
        const zoomLevelDisplay = document.getElementById('zoom-level');
        const imageWrapper = document.getElementById('image-wrapper');
        const imageContainer = document.getElementById('image-container');

        // ==================== 渲染画廊 ====================
        function renderGallery() {
            gallery.innerHTML = '';
            
            photos.forEach((photo, index) => {
                const card = document.createElement('div');
                card.className = 'photo-card';
                
                card.innerHTML = `
                    <div class="photo-wrapper">
                        <img src="${photo.thumbnail}" alt="${photo.title}" loading="lazy">
                        <div class="photo-placeholder"></div>
                    </div>
                    <div class="photo-overlay">
                        <h3 class="photo-title">${photo.title}</h3>
                        <div class="photo-meta">
                            <span>${photo.format}</span>
                            <span>•</span>
                            <span>${photo.width} × ${photo.height}</span>
                            <span>•</span>
                            <span>${photo.size}MB</span>
                        </div>
                        ${photo.tags && photo.tags.length > 0 ? `
                            <div class="photo-tags">
                                ${photo.tags.slice(0, 3).map(tag => `<span class="photo-tag">${tag}</span>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
                
                const img = card.querySelector('img');
                img.addEventListener('load', () => {
                    img.classList.add('loaded');
                });
                
                card.addEventListener('click', () => openViewer(index));
                gallery.appendChild(card);
            });
            
            photoCount.textContent = `${photos.length} 张照片`;
        }

        // ==================== 打开查看器 ====================
        function openViewer(index) {
            currentPhotoIndex = index;
            resetZoom();
            updateViewerImage();
            viewer.classList.add('active');
            document.body.style.overflow = 'hidden';
            
            // 3秒后隐藏提示
            setTimeout(() => {
                viewerHint.classList.add('hidden');
            }, 3000);
        }

        // ==================== 关闭查看器 ====================
        function closeViewer() {
            viewer.classList.remove('active');
            infoPanel.classList.remove('open');
            document.body.style.overflow = '';
            resetZoom();
        }

        // ==================== 更新查看器图片 ====================
        function updateViewerImage() {
            const photo = photos[currentPhotoIndex];
            viewerImage.src = photo.full;
            viewerBackdrop.style.backgroundImage = `url(${photo.full})`;
            photoCounter.textContent = `${currentPhotoIndex + 1} / ${photos.length}`;
            panelTitle.textContent = photo.title;
            renderInfoPanel(photo);
        }

        // ==================== 渲染信息面板 ====================
        function renderInfoPanel(photo) {
            const exif = photo.exif;
            
            infoPanelContent.innerHTML = `
                <div class="info-section">
                    <h4 class="info-section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
                            <circle cx="12" cy="13" r="3"/>
                        </svg>
                        基础信息
                    </h4>
                    <div class="info-grid">
                        <div class="info-item full-width">
                            <div class="info-item-label">标题</div>
                            <div class="info-item-value">${photo.title}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-item-label">格式</div>
                            <div class="info-item-value">${photo.format}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-item-label">尺寸</div>
                            <div class="info-item-value">${photo.width} × ${photo.height}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-item-label">文件大小</div>
                            <div class="info-item-value">${photo.size} MB</div>
                        </div>
                        <div class="info-item">
                            <div class="info-item-label">拍摄日期</div>
                            <div class="info-item-value">${photo.date}</div>
                        </div>
                        <div class="info-item full-width">
                            <div class="info-item-label">位置</div>
                            <div class="info-item-value">${photo.location}</div>
                        </div>
                    </div>
                    ${photo.description ? `
                        <p class="info-description">${photo.description}</p>
                    ` : ''}
                </div>

                ${photo.tags && photo.tags.length > 0 ? `
                    <div class="info-section">
                        <h4 class="info-section-title">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
                                <line x1="7" y1="7" x2="7.01" y2="7"/>
                            </svg>
                            标签
                        </h4>
                        <div class="tags-list">
                            ${photo.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                    </div>
                ` : ''}

                <div class="info-section">
                    <h4 class="info-section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                            <circle cx="12" cy="13" r="4"/>
                        </svg>
                        相机信息
                    </h4>
                    <div class="info-grid">
                        <div class="info-item full-width">
                            <div class="info-item-label">相机</div>
                            <div class="info-item-value">${exif.make} ${exif.model}</div>
                        </div>
                        <div class="info-item full-width">
                            <div class="info-item-label">镜头</div>
                            <div class="info-item-value">${exif.lens}</div>
                        </div>
                    </div>
                </div>

                <div class="info-section">
                    <h4 class="info-section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12,6 12,12 16,14"/>
                        </svg>
                        拍摄参数
                    </h4>
                    <div class="exif-grid">
                        <div class="exif-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                            </svg>
                            <div class="exif-item-content">
                                <div class="exif-item-label">光圈</div>
                                <div class="exif-item-value">${exif.aperture}</div>
                            </div>
                        </div>
                        <div class="exif-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <polyline points="12,6 12,12 16,14"/>
                            </svg>
                            <div class="exif-item-content">
                                <div class="exif-item-label">快门</div>
                                <div class="exif-item-value">${exif.shutterSpeed}</div>
                            </div>
                        </div>
                        <div class="exif-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            </svg>
                            <div class="exif-item-content">
                                <div class="exif-item-label">ISO</div>
                                <div class="exif-item-value">${exif.iso}</div>
                            </div>
                        </div>
                        <div class="exif-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 3L3 21"/>
                                <circle cx="12" cy="12" r="10"/>
                            </svg>
                            <div class="exif-item-content">
                                <div class="exif-item-label">焦距</div>
                                <div class="exif-item-value">${exif.focalLength35mm || exif.focalLength}</div>
                            </div>
                        </div>
                        ${exif.exposureBias ? `
                            <div class="exif-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="12" y1="5" x2="12" y2="19"/>
                                    <line x1="5" y1="12" x2="19" y2="12"/>
                                </svg>
                                <div class="exif-item-content">
                                    <div class="exif-item-label">曝光补偿</div>
                                    <div class="exif-item-value">${exif.exposureBias}</div>
                                </div>
                            </div>
                        ` : ''}
                        <div class="exif-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="13,2 3,14 12,14 11,22 21,10 12,10"/>
                            </svg>
                            <div class="exif-item-content">
                                <div class="exif-item-label">测光模式</div>
                                <div class="exif-item-value">${exif.meteringMode}</div>
                            </div>
                        </div>
                        <div class="exif-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="5"/>
                                <line x1="12" y1="1" x2="12" y2="3"/>
                                <line x1="12" y1="21" x2="12" y2="23"/>
                            </svg>
                            <div class="exif-item-content">
                                <div class="exif-item-label">白平衡</div>
                                <div class="exif-item-value">${exif.whiteBalance}</div>
                            </div>
                        </div>
                        <div class="exif-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="13,2 3,14 12,14 11,22 21,10 12,10"/>
                            </svg>
                            <div class="exif-item-content">
                                <div class="exif-item-label">闪光灯</div>
                                <div class="exif-item-value">${exif.flash}</div>
                            </div>
                        </div>
                    </div>
                </div>

                ${exif.gps ? `
                    <div class="info-section">
                        <h4 class="info-section-title">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                                <circle cx="12" cy="10" r="3"/>
                            </svg>
                            GPS 信息
                        </h4>
                        <div class="info-grid">
                            <div class="info-item">
                                <div class="info-item-label">纬度</div>
                                <div class="info-item-value">${exif.gps.latitude.toFixed(4)}°</div>
                            </div>
                            <div class="info-item">
                                <div class="info-item-label">经度</div>
                                <div class="info-item-value">${exif.gps.longitude.toFixed(4)}°</div>
                            </div>
                            <div class="info-item full-width">
                                <div class="info-item-label">海拔</div>
                                <div class="info-item-value">${exif.gps.altitude} 米</div>
                            </div>
                        </div>
                    </div>
                ` : ''}
            `;
        }

        // ==================== 缩放功能 ====================
        function updateZoom() {
            viewerImage.style.transform = `scale(${zoomLevel}) translate(${panX}px, ${panY}px)`;
            zoomLevelDisplay.textContent = `${Math.round(zoomLevel * 100)}%`;
        }

        function resetZoom() {
            zoomLevel = 1;
            panX = 0;
            panY = 0;
            updateZoom();
        }

        function zoomIn() {
            zoomLevel = Math.min(zoomLevel * 1.2, 5);
            updateZoom();
        }

        function zoomOut() {
            zoomLevel = Math.max(zoomLevel / 1.2, 1);
            if (zoomLevel === 1) {
                panX = 0;
                panY = 0;
            }
            updateZoom();
        }

        // ==================== 导航 ====================
        function nextPhoto() {
            currentPhotoIndex = (currentPhotoIndex + 1) % photos.length;
            resetZoom();
            updateViewerImage();
        }

        function prevPhoto() {
            currentPhotoIndex = (currentPhotoIndex - 1 + photos.length) % photos.length;
            resetZoom();
            updateViewerImage();
        }

        // ==================== 分享功能 ====================
        function sharePhoto() {
            const photo = photos[currentPhotoIndex];
            if (navigator.share) {
                navigator.share({
                    title: photo.title,
                    text: photo.description,
                    url: window.location.href
                });
            } else {
                // 复制链接
                navigator.clipboard.writeText(window.location.href);
                alert('链接已复制到剪贴板');
            }
        }

        // ==================== 下载功能 ====================
        function downloadPhoto() {
            const photo = photos[currentPhotoIndex];
            const link = document.createElement('a');
            link.href = photo.full;
            link.download = `${photo.title}.jpg`;
            link.target = '_blank';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // ==================== 全屏功能 ====================
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                viewer.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // ==================== 事件监听 ====================
        
        // 关闭按钮
        document.getElementById('close-btn').addEventListener('click', closeViewer);
        
        // 导航按钮
        document.getElementById('prev-btn').addEventListener('click', prevPhoto);
        document.getElementById('next-btn').addEventListener('click', nextPhoto);
        document.getElementById('prev-photo').addEventListener('click', prevPhoto);
        document.getElementById('next-photo').addEventListener('click', nextPhoto);
        
        // 缩放控制
        document.getElementById('zoom-in').addEventListener('click', zoomIn);
        document.getElementById('zoom-out').addEventListener('click', zoomOut);
        document.getElementById('zoom-reset').addEventListener('click', resetZoom);
        
        // 功能按钮
        document.getElementById('info-btn').addEventListener('click', () => {
            infoPanel.classList.toggle('open');
        });
        
        document.getElementById('close-panel-btn').addEventListener('click', () => {
            infoPanel.classList.remove('open');
        });
        
        document.getElementById('share-btn').addEventListener('click', sharePhoto);
        document.getElementById('download-btn').addEventListener('click', downloadPhoto);
        document.getElementById('fullscreen-btn').addEventListener('click', toggleFullscreen);

        // 点击背景关闭
        viewer.addEventListener('click', (e) => {
            if (e.target === viewer || e.target === viewer.querySelector('.viewer-container')) {
                closeViewer();
            }
        });

        // 键盘导航
        document.addEventListener('keydown', (e) => {
            if (!viewer.classList.contains('active')) return;
            
            switch (e.key) {
                case 'Escape':
                    closeViewer();
                    break;
                case 'ArrowLeft':
                    prevPhoto();
                    break;
                case 'ArrowRight':
                    nextPhoto();
                    break;
                case '+':
                case '=':
                    zoomIn();
                    break;
                case '-':
                    zoomOut();
                    break;
                case '0':
                    resetZoom();
                    break;
                case 'i':
                    infoPanel.classList.toggle('open');
                    break;
                case 'f':
                    toggleFullscreen();
                    break;
            }
        });

        // 鼠标滚轮缩放
        viewerImage.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (e.deltaY < 0) {
                zoomIn();
            } else {
                zoomOut();
            }
        });

        // 拖拽平移
        viewerImage.addEventListener('mousedown', (e) => {
            if (zoomLevel > 1) {
                isDragging = true;
                startX = e.clientX - panX;
                startY = e.clientY - panY;
                viewerImage.style.cursor = 'grabbing';
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging && zoomLevel > 1) {
                panX = e.clientX - startX;
                panY = e.clientY - startY;
                
                // 限制平移范围
                const maxPan = (zoomLevel - 1) * 300;
                panX = Math.max(-maxPan, Math.min(maxPan, panX));
                panY = Math.max(-maxPan, Math.min(maxPan, panY));
                
                updateZoom();
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            viewerImage.style.cursor = zoomLevel > 1 ? 'grab' : 'default';
        });

        // 触摸手势支持
        let touchStartX = 0;
        let touchStartY = 0;
        let touchStartDistance = 0;

        viewerImage.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                // 双指缩放
                touchStartDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                initialZoom = zoomLevel;
            } else if (e.touches.length === 1 && zoomLevel > 1) {
                // 单指平移
                isDragging = true;
                touchStartX = e.touches[0].clientX - panX;
                touchStartY = e.touches[0].clientY - panY;
            } else if (e.touches.length === 1) {
                // 记录起始位置用于滑动切换
                touchStartX = e.touches[0].clientX;
            }
        });

        viewerImage.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                // 双指缩放
                const currentDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const scale = currentDistance / touchStartDistance;
                zoomLevel = Math.max(1, Math.min(initialZoom * scale, 5));
                updateZoom();
            } else if (e.touches.length === 1 && isDragging && zoomLevel > 1) {
                // 单指平移
                panX = e.touches[0].clientX - touchStartX;
                panY = e.touches[0].clientY - touchStartY;
                updateZoom();
            }
        });

        viewerImage.addEventListener('touchend', (e) => {
            if (e.touches.length === 0) {
                if (isDragging && zoomLevel === 1) {
                    // 滑动切换照片
                    const touchEndX = e.changedTouches[0].clientX;
                    const diff = touchStartX - touchEndX;
                    
                    if (Math.abs(diff) > 50) {
                        if (diff > 0) {
                            nextPhoto();
                        } else {
                            prevPhoto();
                        }
                    }
                }
                isDragging = false;
            }
        });

        // ==================== 初始化 ====================
        renderGallery();
    </script>
</body>
</html>
